<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Professional - AP Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pro-page { min-height: calc(100vh - var(--header-height) - 200px); padding: var(--spacing-xl) 0; background: var(--gray-50); }
        .pro-card { max-width: 560px; margin: 0 auto; background: white; border-radius: var(--radius-2xl); padding: var(--spacing-2xl); box-shadow: var(--shadow-xl); border: 1px solid var(--gray-200); }
        .pro-card h1 { font-size: 1.5rem; margin-bottom: var(--spacing-sm); color: var(--gray-900); }
        .pro-card p.lead { color: var(--gray-600); margin-bottom: var(--spacing-lg); font-size: var(--font-size-sm); }
        .form-group { margin-bottom: var(--spacing-md); }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--gray-800); font-size: var(--font-size-sm); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--gray-300); border-radius: var(--radius-lg); font-family: inherit;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .btn-submit { width: 100%; padding: 0.875rem; background: var(--primary-600); color: white; border: none; border-radius: var(--radius-lg); font-weight: 600; cursor: pointer; margin-top: var(--spacing-md); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .note { font-size: 0.85rem; color: var(--gray-500); margin-top: var(--spacing-md); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="/" class="logo">AP<span>Services</span></a>
                <div class="nav-links"></div>
                <button type="button" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <section class="pro-page">
        <div class="container">
            <div class="pro-card">
                <h1><i class="fas fa-briefcase" style="color: var(--primary-600);"></i> Become a professional</h1>
                <p class="lead">Apply with your details and documents. After approval you will appear in search and receive job requests.</p>

                <form id="proForm">
                    <div class="form-group">
                        <label for="serviceId">Primary service you offer *</label>
                        <select id="serviceId" required>
                            <option value="">Loading services…</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bio">Bio *</label>
                        <textarea id="bio" required placeholder="Briefly describe your experience and what you offer" maxlength="500"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="experience_years">Years of experience *</label>
                            <input type="number" id="experience_years" min="0" max="50" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="hourly_rate">Hourly rate (₹) *</label>
                            <input type="number" id="hourly_rate" min="50" step="1" value="499" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="idProof">ID proof *</label>
                        <input type="file" id="idProof" accept="image/*,application/pdf" required>
                    </div>
                    <div class="form-group">
                        <label for="addressProof">Address proof *</label>
                        <input type="file" id="addressProof" accept="image/*,application/pdf" required>
                    </div>
                    <div class="form-group">
                        <label for="profilePhoto">Profile photo (optional)</label>
                        <input type="file" id="profilePhoto" accept="image/*">
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Submit application</button>
                    <p class="note">New accounts need at least one catalog service so customers can book you. You can add more services later from your pro dashboard.</p>
                </form>
            </div>
        </div>
    </section>

    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof UI !== 'undefined') UI.updateNavbar();
            if (!Auth.checkAuth()) {
                Toast.show('Please log in to apply as a professional', 'warning');
                setTimeout(() => { window.location.href = '/login.html?redirect=/become-a-pro.html'; }, 1200);
                return;
            }
            const user = Auth.getUser();
            if (user.role === 'worker') {
                Toast.show('You already have a professional account', 'info');
                setTimeout(() => { window.location.href = '/worker-dashboard.html'; }, 800);
                return;
            }
            if (user.role === 'admin') {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            const sel = document.getElementById('serviceId');
            try {
                const res = await API.get('/services');
                const list = res.data || [];
                if (!list.length) {
                    sel.innerHTML = '<option value="">No services available</option>';
                } else {
                    sel.innerHTML = '<option value="">Select a service</option>' +
                        list.map((s) => `<option value="${s.id}">${s.name} (${s.category || 'Service'})</option>`).join('');
                }
            } catch (_e) {
                sel.innerHTML = '<option value="">Could not load services</option>';
            }

            document.getElementById('proForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const sid = document.getElementById('serviceId').value;
                const bio = document.getElementById('bio').value.trim();
                const experience_years = document.getElementById('experience_years').value;
                const hourly_rate = document.getElementById('hourly_rate').value;
                const idF = document.getElementById('idProof').files[0];
                const adF = document.getElementById('addressProof').files[0];
                const phF = document.getElementById('profilePhoto').files[0];

                if (!sid || !bio || !idF || !adF) {
                    Toast.show('Please fill all required fields', 'warning');
                    return;
                }
                if (Number(hourly_rate) < 50) {
                    Toast.show('Hourly rate must be at least ₹50', 'warning');
                    return;
                }

                const fd = new FormData();
                fd.append('bio', bio);
                fd.append('experience_years', experience_years);
                fd.append('hourly_rate', hourly_rate);
                fd.append('idProof', idF);
                fd.append('addressProof', adF);
                if (phF) fd.append('profilePhoto', phF);
                const hr = parseFloat(hourly_rate);
                fd.append('services', JSON.stringify([{ serviceId: sid, customRate: hr }]));

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                try {
                    const res = await API.upload('/workers/register', fd, 'POST');
                    if (res && res.success === false) {
                        throw new Error(res.message || 'Application rejected');
                    }
                    Toast.show('Application submitted! Loading your pro dashboard…', 'success');
                    await Auth.refreshSession();
                    setTimeout(() => { window.location.href = '/worker-dashboard.html'; }, 1200);
                } catch (err) {
                    Toast.show(err.message || 'Application failed', 'error');
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
