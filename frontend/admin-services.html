<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Services - Admin | AP Services</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Copy all your existing styles here */
        :root {
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-300: #93c5fd;
            --primary-400: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-800: #1e40af;
            --primary-900: #1e3a8a;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            
            --radius-lg: 0.5rem;
            --radius-xl: 0.75rem;
            --radius-2xl: 1rem;
            --radius-full: 9999px;
            
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            
            --header-height: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
        }

        .navbar {
            background: white;
            box-shadow: var(--shadow-md);
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--header-height);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gray-900);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary-600);
        }

        .admin-page {
            padding: var(--spacing-xl) 0;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--gray-800);
        }

        .admin-header h1 i {
            color: var(--primary-600);
            margin-right: var(--spacing-sm);
        }

        .btn-primary {
            background: var(--primary-600);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-700);
        }

        .btn-outline {
            background: white;
            color: var(--primary-600);
            border: 1px solid var(--primary-600);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-outline:hover {
            background: var(--primary-50);
        }

        .btn-danger {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-lg);
        }

        .service-card {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }

        .service-image {
            height: 200px;
            position: relative;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .service-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .service-image i {
            font-size: 4rem;
            color: var(--gray-400);
        }

        .service-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.25rem 1rem;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
        }

        .service-status.active {
            background: #d1fae5;
            color: #065f46;
        }

        .service-status.inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .service-content {
            padding: var(--spacing-lg);
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }

        .service-header h3 {
            font-size: 1.2rem;
        }

        .service-category {
            background: var(--primary-50);
            color: var(--primary-700);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
        }

        .service-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-600);
            margin: var(--spacing-sm) 0;
        }

        .service-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .service-actions button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .edit-btn {
            background: var(--primary-50);
            color: var(--primary-700);
        }

        .delete-btn {
            background: #fee2e2;
            color: var(--error);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-2xl);
            padding: var(--spacing-2xl);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-500);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 600;
            color: var(--gray-700);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-lg);
            font-size: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            cursor: pointer;
            background: var(--gray-50);
            margin-bottom: var(--spacing-md);
        }

        .image-upload-area:hover {
            border-color: var(--primary-500);
            background: var(--primary-50);
        }

        .image-upload-area i {
            font-size: 3rem;
            color: var(--primary-600);
            margin-bottom: var(--spacing-sm);
        }

        .image-preview {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-top: var(--spacing-md);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-image {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-top: var(--spacing-xl);
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            background: white;
            box-shadow: var(--shadow-xl);
            display: none;
            z-index: 9999;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .toast.error {
            background: var(--error);
            color: white;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="/" class="logo">AP<span>Services</span></a>
                <div class="nav-links">
                    <a href="/admin-dashboard.html">Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Admin Page -->
    <section class="admin-page">
        <div class="container">
            <div class="admin-header">
                <h1><i class="fas fa-tools"></i> Manage Services</h1>
                <button class="btn-primary" onclick="showAddServiceModal()">
                    <i class="fas fa-plus"></i> Add New Service
                </button>
            </div>

            <!-- Services Grid -->
            <div id="servicesGrid" class="services-grid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Loading services...
                </div>
            </div>
        </div>
    </section>

    <!-- Service Modal -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><span id="modalTitle">Add Service</span></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="serviceForm" enctype="multipart/form-data">
                <input type="hidden" id="serviceId">
                
                <!-- Image Upload -->
                <div class="form-group">
                    <label>Service Image</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload image</p>
                        <small>JPG, PNG, WEBP (Max 5MB)</small>
                        <input type="file" id="serviceImage" accept="image/*" style="display: none;">
                    </div>
                    <div id="imagePreview" class="image-preview" style="display: none;">
                        <img src="" alt="Preview">
                        <button type="button" class="remove-image" onclick="removeImage()">×</button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Service Name *</label>
                        <input type="text" class="form-control" id="serviceName" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select class="form-control" id="serviceCategory" required>
                            <option value="">Select Category</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Cleaning">Cleaning</option>
                            <option value="Beauty">Beauty</option>
                            <option value="Painting">Painting</option>
                            <option value="Carpentry">Carpentry</option>
                            <option value="AC Repair">AC Repair</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" id="serviceDescription" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Icon (fallback if no image)</label>
                        <input type="text" class="form-control" id="serviceIcon" placeholder="e.g., wrench">
                    </div>
                    <div class="form-group">
                        <label>Base Price (₹) *</label>
                        <input type="number" class="form-control" id="servicePrice" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price Type *</label>
                        <select class="form-control" id="servicePriceType" required>
                            <option value="hourly">Hourly</option>
                            <option value="fixed">Fixed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select class="form-control" id="serviceStatus">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveBtn">Save Service</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

   <script>
    // Configuration
    const API_BASE_URL = 'https://ap-sevces.onrender.com/api';
    const BACKEND_URL = 'https://ap-sevces.onrender.com';
    
    // State
    let currentServiceId = null;
    let selectedFile = null;

    // Helper function to get correct image URL
    function getImageUrl(path) {
        if (!path) return null;
        if (path.startsWith('http')) return path;
        const cleanPath = path.startsWith('/') ? path : `/${path}`;
        return `${BACKEND_URL}${cleanPath}`;
    }

    // Toast
    const Toast = {
        show(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.textContent = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    };

    // Load services on page load
    document.addEventListener('DOMContentLoaded', async () => {
        await loadServices();
        // setupEventListeners(); // REMOVED - function doesn't exist
    });

    // Load services from API
    async function loadServices() {
        try {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_BASE_URL}/admin/services`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            const data = await response.json();
            
            if (data.success) {
                displayServices(data.data);
            } else {
                Toast.show('Failed to load services', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            Toast.show('Error loading services', 'error');
        }
    }

    // Display services with fixed image URLs
    function displayServices(services) {
        const grid = document.getElementById('servicesGrid');
        
        if (!services || services.length === 0) {
            grid.innerHTML = '<div class="loading-spinner">No services found</div>';
            return;
        }

        grid.innerHTML = services.map(service => {
            const imageUrl = getImageUrl(service.image_url);
            return `
                <div class="service-card">
                    <div class="service-image">
                        ${imageUrl ? 
                            `<img src="${imageUrl}" alt="${service.name}" 
                                  onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\\'fas fa-${service.icon || 'tools'}\\'></i>';">` : 
                            `<i class="fas fa-${service.icon || 'tools'}"></i>`
                        }
                        <span class="service-status ${service.is_active ? 'active' : 'inactive'}">
                            ${service.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                    <div class="service-content">
                        <div class="service-header">
                            <h3>${service.name}</h3>
                            <span class="service-category">${service.category}</span>
                        </div>
                        <p class="service-description">${service.description || 'No description'}</p>
                        <div class="service-price">₹${service.base_price}/${service.price_type}</div>
                        <div class="service-actions">
                            <button class="edit-btn" onclick="editService('${service.id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="delete-btn" onclick="deleteService('${service.id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Show add modal
    function showAddServiceModal() {
        currentServiceId = null;
        document.getElementById('modalTitle').textContent = 'Add Service';
        document.getElementById('serviceForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
        selectedFile = null;
        document.getElementById('serviceModal').classList.add('show');
    }

    // Edit service
    async function editService(serviceId) {
        try {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_BASE_URL}/services/${serviceId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            if (data.success) {
                const service = data.data;
                currentServiceId = serviceId;
                
                document.getElementById('modalTitle').textContent = 'Edit Service';
                document.getElementById('serviceId').value = service.id;
                document.getElementById('serviceName').value = service.name;
                document.getElementById('serviceCategory').value = service.category;
                document.getElementById('serviceDescription').value = service.description || '';
                document.getElementById('serviceIcon').value = service.icon || '';
                document.getElementById('servicePrice').value = service.base_price;
                document.getElementById('servicePriceType').value = service.price_type;
                document.getElementById('serviceStatus').value = service.is_active;
                
                if (service.image_url) {
                    const preview = document.getElementById('imagePreview');
                    preview.style.display = 'block';
                    preview.querySelector('img').src = getImageUrl(service.image_url);
                } else {
                    document.getElementById('imagePreview').style.display = 'none';
                }
                
                document.getElementById('serviceModal').classList.add('show');
            }
        } catch (error) {
            console.error('Error:', error);
            Toast.show('Failed to load service', 'error');
        }
    }

    // Handle form submission
    document.getElementById('serviceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        const token = localStorage.getItem('token');
        const formData = new FormData();
        
        // Append all form fields
        formData.append('name', document.getElementById('serviceName').value);
        formData.append('category', document.getElementById('serviceCategory').value);
        formData.append('description', document.getElementById('serviceDescription').value || '');
        formData.append('icon', document.getElementById('serviceIcon').value || '');
        formData.append('base_price', document.getElementById('servicePrice').value);
        formData.append('price_type', document.getElementById('servicePriceType').value);
        formData.append('is_active', document.getElementById('serviceStatus').value);

        if (selectedFile) {
            formData.append('image', selectedFile);
        }

        try {
            const url = currentServiceId 
                ? `${API_BASE_URL}/admin/services/${currentServiceId}`
                : `${API_BASE_URL}/admin/services`;
            
            const response = await fetch(url, {
                method: currentServiceId ? 'PUT' : 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.success) {
                Toast.show(currentServiceId ? 'Service updated!' : 'Service created!', 'success');
                closeModal();
                await loadServices();
            } else {
                console.error('❌ Server error:', data);
                Toast.show(data.message || 'Operation failed', 'error');
            }
        } catch (error) {
            console.error('❌ Fetch error:', error);
            Toast.show('Network error', 'error');
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Save Service';
        }
    });

    // Delete service
    async function deleteService(serviceId) {
        if (!confirm('Are you sure you want to delete this service?')) return;
        
        try {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_BASE_URL}/admin/services/${serviceId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            
            const data = await response.json();
            
            if (data.success) {
                Toast.show('Service deleted', 'success');
                await loadServices();
            } else {
                Toast.show('Failed to delete service', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            Toast.show('Error deleting service', 'error');
        }
    }

    // Image upload handling
    document.getElementById('imageUploadArea').addEventListener('click', function() {
        document.getElementById('serviceImage').click();
    });

    document.getElementById('serviceImage').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                Toast.show('File too large (max 5MB)', 'error');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.style.display = 'block';
                preview.querySelector('img').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function removeImage() {
        selectedFile = null;
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('serviceImage').value = '';
    }

    function closeModal() {
        document.getElementById('serviceModal').classList.remove('show');
        document.getElementById('imagePreview').style.display = 'none';
        selectedFile = null;
    }

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('serviceModal');
        if (event.target === modal) {
            closeModal();
        }
    };

    // Make functions global
    window.showAddServiceModal = showAddServiceModal;
    window.editService = editService;
    window.deleteService = deleteService;
    window.closeModal = closeModal;
    window.removeImage = removeImage;
</script>
</body>
</html>
